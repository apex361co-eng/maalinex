<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Maalinex — سیستم عامل مدیریت هلدینگ</title>
<meta name="theme-color" content="#101418">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maalinex">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0b; --bg2:rgba(23,27,24,.78); --bg3:rgba(46,52,46,.55); --line:rgba(212,175,55,.16);
  --tx:#ece7d9; --tx2:#96a09a; --ac:#d4af37; --acd:#b8860b; --grn:#2f9e6e; --grnd:#1d5c41;
  --ok:#3fae7c; --warn:#d9a441; --bad:#e06a5f; --pur:#8a7fd6; --r:14px;
  --glass:blur(16px) saturate(1.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Vazirmatn,Tahoma,sans-serif;color:var(--tx);font-size:14px;
  background:
    radial-gradient(1000px 560px at 92% -12%, rgba(212,175,55,.10), transparent 60%),
    radial-gradient(900px 560px at -8% 112%, rgba(31,111,80,.20), transparent 62%),
    radial-gradient(700px 400px at 50% 120%, rgba(212,175,55,.05), transparent 60%),
    #0a0c0b;
  background-attachment:fixed}
#app{display:flex;height:100dvh;overflow:hidden}
/* sidebar */
#side{width:230px;background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;transition:margin .2s}
#side .logo{padding:16px 14px;font-weight:800;font-size:16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
#nav{overflow-y:auto;flex:1;padding:8px}
.nav-h{font-size:11px;color:var(--tx2);margin:12px 8px 4px}
.nav-i{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--tx2);white-space:nowrap}
.nav-i:hover{background:var(--bg3);color:var(--tx)}
.nav-i.on{background:rgba(212,175,55,.13);color:#ecd98f;font-weight:600;box-shadow:inset 2px 0 0 var(--ac)}
.nav-i .c{margin-inline-start:auto;font-size:11px;background:var(--bg);border-radius:99px;padding:1px 7px;color:var(--tx2)}
/* main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#top{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass)}
#burger{display:none;background:none;border:none;color:var(--tx);font-size:20px;cursor:pointer}
#ttl{font-weight:700;font-size:15px}
#syncdot{width:9px;height:9px;border-radius:50%;background:var(--tx2)}
#syncdot.ok{background:var(--ok)} #syncdot.off{background:var(--warn)} #syncdot.err{background:var(--bad)}
#synctxt{font-size:11px;color:var(--tx2)}
#top .sp{flex:1}
#content{flex:1;overflow:auto;padding:16px;-webkit-overflow-scrolling:touch}
/* buttons & inputs */
.btn{background:linear-gradient(135deg,#e2c04e,#b8860b);color:#141310;border:none;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:700;box-shadow:0 3px 14px rgba(212,175,55,.22)}
.btn.gh{background:var(--bg3);color:var(--tx);box-shadow:none;border:1px solid var(--line)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.bad{background:var(--bad)}
input,select,textarea{background:var(--bg);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac)}
label{font-size:12px;color:var(--tx2);display:block;margin:10px 0 4px}
/* table */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass)}
table{border-collapse:collapse;width:100%;min-width:600px}
th{font-size:12px;color:var(--tx2);text-align:right;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:var(--bg2)}
td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis}
tbody tr{cursor:pointer} tbody tr:hover{background:var(--bg3)}
.tag{display:inline-block;background:var(--bg3);border:1px solid var(--line);border-radius:99px;padding:1px 9px;font-size:11px;margin-inline-end:4px}
.tag.g{border-color:var(--ok);color:var(--ok)} .tag.y{border-color:var(--warn);color:var(--warn)}
.tag.r{border-color:var(--bad);color:var(--bad)} .tag.b{border-color:var(--ac);color:var(--ac)}
.tag.p{border-color:var(--pur);color:var(--pur)}
/* progress */
.pbar{background:var(--bg);border-radius:99px;height:8px;min-width:70px;overflow:hidden;display:inline-block;vertical-align:middle;width:90px}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,#b8860b,#d4af37);border-radius:99px}
.pnum{font-size:11px;color:var(--tx2);margin-inline-start:6px}
/* modal */
#ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow:auto;padding:24px 12px}
#ovl.show{display:flex}
#modal{background:rgba(20,24,21,.88);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);border-radius:18px;width:100%;max-width:680px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
#modal h3{margin-bottom:4px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.mrow .full{grid-column:1/-1}
.mfoot{display:flex;gap:8px;margin-top:18px}
.comp{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.comp .chip{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--tx2)}
.comp .chip b{color:var(--tx)}
/* rel picker */
.relbox{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px;min-height:38px;cursor:pointer}
.relbox .tag{cursor:pointer}
.rellist{border:1px solid var(--line);border-radius:8px;margin-top:4px;max-height:180px;overflow:auto;background:var(--bg)}
.rellist div{padding:7px 10px;cursor:pointer;font-size:13px}
.rellist div:hover{background:var(--bg3)}
.rellist div.sel{color:var(--ac);font-weight:600}
/* dashboard */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 8px 26px rgba(0,0,0,.28)}
.card .v{color:#ecd98f}
.card .v{font-size:24px;font-weight:800;margin-top:4px}
.card .l{font-size:12px;color:var(--tx2)}
.sec{background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:0 8px 26px rgba(0,0,0,.28)}
.sec h3{font-size:14px;margin-bottom:12px;display:flex;gap:6px;align-items:center}
.tree{margin-inline-start:6px}
.tnode{border-inline-start:2px solid var(--line);padding:6px 14px 6px 0;margin-inline-start:8px;position:relative}
.tline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0;border-radius:6px;cursor:pointer}
.tline:hover{background:var(--bg3)}
.tline .nm{font-weight:600}
.alert{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:8px;background:var(--bg);margin-bottom:6px;cursor:pointer;font-size:13px}
.alert:hover{background:var(--bg3)}
.empty{color:var(--tx2);padding:22px;text-align:center;font-size:13px}
/* record page */
.rhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.rhead h2{font-size:20px}
.crumb{font-size:12px;color:var(--tx2);margin-bottom:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.crumb a{color:var(--ac);cursor:pointer;text-decoration:none}
.props{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px 18px;background:var(--bg2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:16px}
.prop{display:flex;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);align-items:baseline;min-width:0}
.prop .pk{font-size:12px;color:var(--tx2);min-width:110px;flex-shrink:0}
.prop .pv{font-size:13px;overflow:hidden;text-overflow:ellipsis}
.relsec h3 .c{font-size:11px;background:var(--bg);border-radius:99px;padding:1px 8px;color:var(--tx2)}
.minitbl td{padding:7px 10px}
.chartgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}
.chartgrid .sec{margin-bottom:0}
/* toolbar */
.tools{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tools input{max-width:260px}
/* pomodoro */
#pomo{position:fixed;bottom:18px;left:18px;z-index:60;width:235px;padding:16px;border-radius:18px;text-align:center;
  background:rgba(18,22,19,.93);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  border:1px solid rgba(212,175,55,.28);box-shadow:0 18px 50px rgba(0,0,0,.55);display:none}
#pomo.show{display:block}
#pomo_time{font-size:44px;font-weight:800;color:#ecd98f;font-variant-numeric:tabular-nums;letter-spacing:1px}
#pomo .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ac);margin:0 2px}
#pomo .dot.off{background:var(--bg3)}
@media (max-width:760px){#pomo{left:10px;right:10px;width:auto;bottom:12px}}
/* login */
#login{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:auto;
  background:radial-gradient(1100px 600px at 85% -10%,rgba(212,175,55,.16) 0%,transparent 55%),
             radial-gradient(900px 500px at 0% 110%,rgba(31,111,80,.30) 0%,transparent 55%),
             linear-gradient(160deg,#0a0c0b 0%,#10140f 100%)}
#login.show{display:flex}
#login .box{background:rgba(21,27,35,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px 28px;width:100%;max-width:410px;
  box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}
.lgo{width:64px;height:64px;border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:900;color:#d4af37;background:#0a0c0b;border:1px solid rgba(212,175,55,.35);
  box-shadow:0 10px 30px rgba(0,0,0,.5);font-family:Georgia,serif}
#login h2{font-size:26px;letter-spacing:.5px;margin-bottom:2px}
#login .sub{color:var(--tx2);font-size:13px;margin-bottom:18px}
.atabs{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:14px}
.atabs button{flex:1;background:none;border:none;color:var(--tx2);font-family:inherit;font-size:13px;padding:8px;border-radius:8px;cursor:pointer;font-weight:600}
.atabs button.on{background:linear-gradient(135deg,#e2c04e,#b8860b);color:#141310}
#login label{text-align:right}
#login details{margin-top:12px;text-align:right}
#login summary{font-size:12px;color:var(--tx2);cursor:pointer}
.btn.big{width:100%;padding:11px;font-size:14px;margin-top:14px;border-radius:10px}
.err{color:var(--bad);font-size:12px;margin-top:8px;min-height:16px}
.quote{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);color:var(--tx2);font-size:12.5px;line-height:2}
.credit{color:#5b6a7c;font-size:11.5px;margin-top:18px}
#side .credit{padding:10px 14px;border-top:1px solid var(--line);margin-top:auto;text-align:center}
@media (max-width:760px){
  #side{position:fixed;inset-block:0;right:0;z-index:40;margin-right:-240px;box-shadow:0 0 30px rgba(0,0,0,.5)}
  #side.open{margin-right:0}
  #burger{display:block}
  .mrow{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <div class="lgo">M</div>
    <h2>Maalinex</h2>
    <div class="sub">سیستم عامل مدیریت هلدینگ</div>
    <div class="atabs">
      <button id="at_in" class="on" onclick="setAuthMode('in')">ورود</button>
      <button id="at_up" onclick="setAuthMode('up')">ثبت‌نام</button>
    </div>
    <label>ایمیل</label><input id="l_email" dir="ltr" type="email" autocomplete="username">
    <label>رمز عبور</label><input id="l_pass" dir="ltr" type="password" autocomplete="current-password">
    <details id="l_conn"><summary>⚙️ تنظیمات اتصال (Supabase)</summary>
      <label>Supabase URL</label><input id="l_url" dir="ltr" placeholder="https://xxxx.supabase.co">
      <label>Anon Key</label><input id="l_key" dir="ltr" placeholder="eyJ...">
    </details>
    <div class="err" id="l_err"></div>
    <button class="btn big" id="l_go" onclick="doLogin()">ورود</button>
    <button class="btn gh" style="width:100%;margin-top:8px" onclick="localOnly()">استفاده بدون حساب (فقط این دستگاه)</button>
    <div class="quote">«آنچه را که نتوان اندازه گرفت، نمی‌توان مدیریت کرد.»<br><span style="font-size:11px">— پیتر دراکر</span></div>
  </div>
  <div class="credit">معماری و ساخت: علی خلج</div>
</div>

<div id="app">
  <aside id="side"><div class="logo"><span class="lgo" style="width:26px;height:26px;border-radius:8px;font-size:14px;margin:0">M</span> Maalinex</div><nav id="nav"></nav><div class="credit">معماری و ساخت: علی خلج</div></aside>
  <div id="main">
    <div id="top">
      <button id="burger" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <span id="ttl">اتاق کنترل</span><span class="sp"></span>
      <span id="who" style="font-size:11px;color:var(--tx2)"></span>
      <span id="synctxt"></span><span id="syncdot"></span>
      <button class="btn gh sm" id="quickbtn" onclick="quickNote()" title="ثبت سریع نکته در بانک دانش">⚡ نکته</button>
      <button class="btn gh sm" id="pomobtn" onclick="togglePomo()">🍅 پومودورو</button>
      <button class="btn gh sm" id="authbtn" onclick="authAction()">ورود</button>
      <button class="btn gh sm" onclick="openSettings()">⚙️</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="pomo">
  <div style="display:flex;align-items:center"><b style="font-size:14px">🍅 پومودورو</b><span style="flex:1"></span>
    <span id="pomo_x" onclick="togglePomo()" style="cursor:pointer;color:var(--tx2)">✕</span></div>
  <div id="pomo_mode" class="tag b" style="margin:10px 0 2px"></div>
  <div id="pomo_time">۲۵:۰۰</div>
  <div style="display:flex;gap:6px;justify-content:center;margin:10px 0 8px">
    <button class="btn sm" id="pomo_go" onclick="pomoStart()">شروع</button>
    <button class="btn gh sm" onclick="pomoSkip()">رد کردن</button>
    <button class="btn gh sm" onclick="pomoReset()">ریست</button>
  </div>
  <div id="pomo_stats" style="font-size:12px;color:var(--tx2)"></div>
  <div style="font-size:10.5px;color:var(--tx2);margin-top:8px;line-height:1.9">۲۵ دقیقه تمرکز → ۵ دقیقه استراحت<br>هر ۴ دور: استراحت بلند ۱۵ دقیقه</div>
</div>
<div id="ovl"><div id="modal"></div></div>

async function initSupabase(){
  if(!cfg.url||!cfg.key)return false;
  if(!window.supabase){
    await new Promise((res,rej)=>{const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);}).catch(()=>null);
  }
  if(!window.supabase)return false;
  sb=window.supabase.createClient(cfg.url,cfg.key);
  const {data}=await sb.auth.getSession(); session=data.session;
  return !!session;
}
async function pullAll(){
  if(!sb||!session)return;
  setSync('','در حال سینک…');
  let from=0, page=1000;
  while(true){
    const {data,error}=await sb.from('records').select('*').range(from,from+page-1);
    if(error){setSync('err','خطای سینک');return;}
    (data||[]).forEach(row=>{
      const loc=recs[row.id];
      const remoteU=new Date(row.updated_at).getTime();
      if(!loc||loc.u<=remoteU){recs[row.id]={id:row.id,e:row.entity,d:row.data,u:remoteU,del:row.deleted};}
    });
    if(!data||data.length<page)break; from+=page;
  }
  saveLocal();setSync('ok','سینک شد');render();
}
async function flush(){
  if(!sb||!session){if(cfg.url)setSync('off','آفلاین — ذخیره محلی');return;}
  while(queue.length){
    const id=queue[0], r=recs[id]; if(!r){queue.shift();saveQ();continue;}
    const {error}=await sb.from('records').upsert({id:r.id,entity:r.e,data:r.d,updated_at:new Date(r.u).toISOString(),deleted:!!r.del});
    if(error){setSync('err','خطا در ارسال — بعداً تلاش می‌شود');return;}
    queue.shift();saveQ();
  }
  setSync('ok','سینک شد');
}
function subscribeRT(){
  if(!sb||!session)return;
  rt=sb.channel('recs').on('postgres_changes',{event:'*',schema:'public',table:'records'},p=>{
    const row=p.new&&p.new.id?p.new:p.old; if(!row||!row.id)return;
    const remoteU=new Date(row.updated_at||Date.now()).getTime();
    const loc=recs[row.id];
    if(!loc||loc.u<remoteU){recs[row.id]={id:row.id,e:row.entity,d:row.data||{},u:remoteU,del:row.deleted};saveLocal();render();}
  }).subscribe();
}

function can(a,e,rec){ // a: 'c' ایجاد | 'e' ویرایش | 'd' حذف
  const r=myRole();
  if(r===PENDING)return false;
  if(r==='ادمین')return true;
  // هرکس پروفایل خودش را می‌تواند ویرایش کند
  if(a==='e'&&e==='hr'&&rec&&(rec.d.email||'').toLowerCase()===myEmail().toLowerCase())return true;
  // ۱) اگر ادمین برای این نقش/کاربر تنظیم سفارشی گذاشته، همان حاکم است
  const lvl=entLevel(e);
  if(lvl){
    if(lvl==='full')return true;
    if(lvl==='edit')return a!=='d'||(rec&&rec.d._by===myEmail());
    return false; // read / hide
  }
  // ۲) پیش‌فرض‌های داخلی
  if(r==='مدیرارشد')return true;
  if(GROWTH.includes(e))return a!=='d'||(rec&&rec.d._by===myEmail());
  if(r==='مدیر')return a!=='d'||(rec&&rec.d._by===myEmail());
  if(r==='معاون')return a!=='d'&&!FIN.includes(e);
  if(r==='کارشناس ارشد')return a!=='d'&&MIDSET.includes(e);
  if(r==='کارشناس')return a!=='d'&&LOWSET.includes(e);
  if(r==='کاربر')return a!=='d'&&['leave','idea'].includes(e);
  // نقش سفارشی بدون تنظیم: فقط مشاهده
  return false;
}

/* ================= COMPUTED (زنجیره آبشاری) ================= */
function taskProg(t){
  const subs=byE('task').filter(x=>x.d.parent&&x.d.parent[0]===t.id);
  if(subs.length)return avg(subs.map(taskProg));
  return t.d.status==='Done'?100:t.d.status==='In progress'?50:0;
}
function projectProg(p){
  const parts=[];
  const tasks=byE('task').filter(t=>relIds(t,'project').includes(p.id)&&!(t.d.parent&&t.d.parent[0]));
  if(tasks.length)parts.push(avg(tasks.map(taskProg)));
  const subs=byE('project').filter(x=>x.d.parent&&x.d.parent[0]===p.id);
  if(subs.length)parts.push(avg(subs.map(projectProg)));
  if(!parts.length)return p.d.status==='تمام شده'?100:0;
  return avg(parts);
}
function objectiveProg(o){
  const parts=[];
  const np=numProg(o.d);
  if(np!=null)parts.push(np);
  const prjs=byE('project').filter(p=>relIds(p,'objective').includes(o.id));
  if(prjs.length)parts.push(avg(prjs.map(projectProg)));
  const subs=byE('objective').filter(x=>x.d.parent&&x.d.parent[0]===o.id);
  if(subs.length)parts.push(avg(subs.map(objectiveProg)));
  if(!parts.length)return o.d.status==='Done'?100:0;
  return avg(parts);
}
function strategyProg(s){
  const obs=byE('objective').filter(o=>relIds(o,'strategy').includes(s.id));
  if(!obs.length)return 0;
  return avg(obs.map(objectiveProg));
}
// درصد پیشرفت عددی — کاهش یا افزایش، هر دو درست محاسبه می‌شود
function numProg(d){
  const cur=d.current, tgt=d.target, st=d.start;
  if(tgt==null)return null;
  if(st!=null&&st!==tgt){ // با مقدار شروع: (فعلی−شروع)/(هدف−شروع) → کاهش وزن ۹۸→۸۶ هم درست
    return Math.max(0,Math.min(100,((cur??st)-st)/(tgt-st)*100));
  }
  if(tgt<=0)return null;
  return Math.max(0,Math.min(100,(cur||0)/tgt*100));
}
function growthProg(g){
  const parts=[];
  const np=numProg(g.d);
  if(np!=null)parts.push(np);
  const subs=byE('growth').filter(x=>x.d.parent&&x.d.parent[0]===g.id);
  if(subs.length)parts.push(avg(subs.map(growthProg)));
  return parts.length?avg(parts):0;
}
function bookProg(b){
  if(b.d.status==='Done')return 100;
  if(b.d.pages>0)return Math.min(100,(b.d.read||0)/b.d.pages*100);
  return b.d.status==='In progress'?50:0;
}
function courseProg(c){
  if(c.d.status==='Done')return 100;
  if(c.d.total>0)return Math.min(100,(c.d.done||0)/c.d.total*100);
  return c.d.status==='In progress'?50:0;
}
function habitPct(h){
  const ks=E.habit.f.filter(f=>f.t===CHK);
  const done=ks.filter(f=>h.d[f.k]).length;

}
function planDays(p){

}

const PROGFN={taskProg,projectProg,objectiveProg,strategyProg,growthProg,habitPct,bookProg,courseProg};
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function fmtN(n){return n==null||isNaN(n)?'—':Number(n).toLocaleString('fa-IR');}
/* --- تاریخ شمسی --- */
function g2j(gy,gm,gd){var g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];var jy=(gy<=1600)?0:979;gy-=(gy<=1600)?621:1600;var gy2=(gm>2)?(gy+1):gy;var days=(365*gy)+(~~((gy2+3)/4))-(~~((gy2+99)/100))+(~~((gy2+399)/400))-80+gd+g_d_m[gm-1];jy+=33*(~~(days/12053));days%=12053;jy+=4*(~~(days/1461));days%=1461;jy+=~~((days-1)/365);if(days>365)days=(days-1)%365;var jm=(days<186)?1+~~(days/31):7+~~((days-186)/30);var jd=1+((days<186)?(days%31):((days-186)%30));return[jy,jm,jd];}
function j2g(jy,jm,jd){var gy=(jy<=979)?621:1600;jy-=(jy<=979)?0:979;var days=(365*jy)+((~~(jy/33))*8)+(~~(((jy%33)+3)/4))+78+jd+((jm<7)?(jm-1)*31:((jm-7)*30)+186);gy+=400*(~~(days/146097));days%=146097;if(days>36524){gy+=100*(~~(--days/36524));days%=36524;if(days>=365)days++;}gy+=4*(~~(days/1461));days%=1461;gy+=~~((days-1)/365);if(days>365)days=(days-1)%365;var gd=days+1;var sal_a=[0,31,((gy%4===0&&gy%100!==0)||(gy%400===0))?29:28,31,30,31,30,31,31,30,31,30,31];var gm;for(gm=0;gm<13&&gd>sal_a[gm];gm++)gd-=sal_a[gm];return[gy,gm,gd];}
function faNum(s){return String(s||'').replace(/[۰-۹]/g,c=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(c)).replace(/[٠-٩]/g,c=>'٠١٢٣٤٥٦٧٨٩'.indexOf(c));}
function parseJDate(str,time){
  str=faNum(str).trim(); if(!str)return null;
  const m=str.match(/^(\d{2,4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/); if(!m)return undefined;
  let jy=+m[1]; if(jy<100)jy+=1400;
  const [gy,gm,gd]=j2g(jy,+m[2],+m[3]);
  let iso=gy+'-'+String(gm).padStart(2,'0')+'-'+String(gd).padStart(2,'0');
  time=faNum(time||'').trim();
  if(time&&/^\d{1,2}:\d{2}$/.test(time))iso+='T'+time.padStart(5,'0');
  return iso;
}
function iso2jstr(iso){if(!iso)return '';const [y,mo,d]=iso.slice(0,10).split('-').map(Number);const j=g2j(y,mo,d);return j[0]+'/'+String(j[1]).padStart(2,'0')+'/'+String(j[2]).padStart(2,'0');}
function isoTime(iso){return iso&&iso.includes('T')?iso.slice(11,16):'';}
function dVal(v){if(!v)return null;if(typeof v==='string')return{s:v,e:null};return v.s||v.e?v:null;}
function ds(v){const d=dVal(v);return d&&d.s?d.s.slice(0,10):null;}
function fmtOne(iso){if(!iso)return '';try{const o={dateStyle:'medium'};if(iso.includes('T'))o.timeStyle='short';return new Intl.DateTimeFormat('fa-IR-u-ca-persian',o).format(new Date(iso));}catch(e){return iso;}}
function fmtD(v){const d=dVal(v);if(!d)return '—';return d.e?fmtOne(d.s)+' ← '+fmtOne(d.e):fmtOne(d.s);}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){return new Date().toISOString().slice(0,10);}

function monthlySVG(){

  const months=[];const MN=['فرو','ارد','خرد','تیر','مرد','شهر','مهر','آبا','آذر','دی','بهم','اسف'];
  for(let i=5;i>=0;i--){let y=cy,m=cm-i;while(m<1){m+=12;y--;}months.push({y,m,inc:0,exp:0});}

    const [y,mo,d]=iso.split('-').map(Number);const j=g2j(y,mo,d);
    const slot=months.find(x=>x.y===j[0]&&x.m===j[1]);if(!slot)return;
    if(t.d.kind==='دریافت')slot.inc+=t.d.amount||0;else if(t.d.kind==='پرداخت')slot.exp+=t.d.amount||0;
  });
  const max=Math.max(1,...months.flatMap(m=>[m.inc,m.exp]));
  if(!months.some(m=>m.inc||m.exp))return `<div class="empty">تراکنشی در ۶ ماه اخیر ثبت نشده</div>`;
  const W=560,H=210,pb=30,pt=14,bw=26,gap=4,gw=W/6;
  let bars='',labels='';
  months.forEach((m,i)=>{
    const x0=W-(i+1)*gw+gw/2; // RTL: جدیدترین سمت چپ؟ نه — راست‌به‌چپ: قدیمی راست
    const hInc=(m.inc/max)*(H-pb-pt), hExp=(m.exp/max)*(H-pb-pt);
    bars+=`<rect x="${x0-bw-gap/2}" y="${H-pb-hInc}" width="${bw}" height="${Math.max(hInc,1)}" rx="4" fill="${CH.aqua}"><title>دریافت ${MN[m.m-1]}: ${abbrN(m.inc)}</title></rect>
           <rect x="${x0+gap/2}" y="${H-pb-hExp}" width="${bw}" height="${Math.max(hExp,1)}" rx="4" fill="${CH.red}"><title>پرداخت ${MN[m.m-1]}: ${abbrN(m.exp)}</title></rect>`;
    labels+=`<text x="${x0}" y="${H-9}" text-anchor="middle" fill="${CH.ink2}" font-size="11.5" font-family="inherit">${MN[m.m-1]} ${String(m.y).slice(2)}</text>`;
  });
  const grid=[0.25,0.5,0.75,1].map(f=>`<line x1="0" x2="${W}" y1="${H-pb-f*(H-pb-pt)}" y2="${H-pb-f*(H-pb-pt)}" stroke="${CH.grid}" stroke-width="1"/>`).join('');
  return `<div style="display:flex;gap:16px;font-size:12px;color:var(--tx2);margin-bottom:6px">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${CH.aqua};margin-inline-end:5px"></span>دریافت</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${CH.red};margin-inline-end:5px"></span>پرداخت</span>
    <span style="margin-inline-start:auto">سقف: ${abbrN(max)}</span></div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" dir="ltr">${grid}
    <line x1="0" x2="${W}" y1="${H-pb}" y2="${H-pb}" stroke="#383835" stroke-width="1.5"/>${bars}${labels}</svg>`;
}

const LVLOPTS=[['','پیش‌فرض نقش'],['hide','مخفی 🚫'],['read','فقط مشاهده 👁'],['edit','ایجاد و ویرایش ✏️'],['full','کامل با حذف 🗑']];
const FLDOPTS=[['','عادی'],['read','فقط مشاهده 👁'],['hide','مخفی 🚫']];
function aclTarget(){
  const t=view.aclT||'role';
  const v=view.aclV||(t==='role'?aclRoles().filter(r=>r!=='ادمین')[0]:(usersList()[0]||{}).email);
  return {t,v};
}
function aclCfg(){
  const {t,v}=aclTarget(); const a=acl();
  return ((t==='role'?a.roles:a.users)||{})[t==='user'?String(v).toLowerCase():v]||{};
}
function setAclT(t){view.aclT=t;view.aclV=null;render();}
function setAclV(v){view.aclV=v;render();}
function setAclEnt(ek,val){
  const {t,v}=aclTarget(); if(!v)return;
  const key=t==='user'?String(v).toLowerCase():v;
  saveAcl(d=>{const b=t==='role'?(d.roles=d.roles||{}):(d.users=d.users||{});
    const c=b[key]=b[key]||{};c.ent=c.ent||{};
    if(val)c.ent[ek]=val;else delete c.ent[ek];});
}
function setAclFld(ek,fk,val){
  const {t,v}=aclTarget(); if(!v)return;
  const key=t==='user'?String(v).toLowerCase():v;
  saveAcl(d=>{const b=t==='role'?(d.roles=d.roles||{}):(d.users=d.users||{});
    const c=b[key]=b[key]||{};c.fld=c.fld||{};
    if(val)c.fld[ek+'.'+fk]=val;else delete c.fld[ek+'.'+fk];});
}
function addRole(){
  const name=prompt('نام نقش جدید:'); if(!name||!name.trim())return;
  const nm=name.trim();
  if(aclRoles().includes(nm)){alert('این نقش وجود دارد');return;}
  saveAcl(d=>{d.roles=d.roles||{};d.roles[nm]={ent:{},fld:{}};});
  view.aclT='role';view.aclV=nm;render();
}
function rmRole(){
  const {t,v}=aclTarget(); if(t!=='role'||ROLES.includes(v)){alert('نقش‌های پایه حذف نمی‌شوند');return;}
  if(!confirm('نقش «'+v+'» حذف شود؟ کاربرانش به «کاربر» برمی‌گردند'))return;
  saveAcl(d=>{if(d.roles)delete d.roles[v];});
  saveUsers(usersList().map(u=>u.role===v?{...u,role:'کاربر'}:u));
  view.aclV=null;render();
}

function habitTrendSVG(){
  const hs=visE('habit').filter(h=>ds(h.d.date));
  if(!hs.length)return `<div class="empty">هنوز روزی ثبت نشده — از «📆 عادت‌های روزانه» شروع کنید</div>`;
  const byDay={};hs.forEach(h=>{byDay[ds(h.d.date)]=habitPct(h);});
  const days=[];for(let i=29;i>=0;i--){const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);days.push([d,byDay[d]]);}
  const W=620,H=170,pb=26,pt=10,bw=Math.floor(W/30)-3;
  let bars='',labels='';
  days.forEach(([d,v],i)=>{
    const x=W-(i+1)*(W/30)+2;
    if(v!=null){const hh=Math.max(2,(v/100)*(H-pb-pt));
      bars+=`<rect x="${x}" y="${H-pb-hh}" width="${bw}" height="${hh}" rx="3" fill="${v>=70?CH.aqua:CH.blue}"><title>${iso2jstr(d)}: ${Math.round(v)}٪</title></rect>`;}
    else bars+=`<rect x="${x}" y="${H-pb-2}" width="${bw}" height="2" rx="1" fill="${CH.grid}"/>`;
    if(i%5===0){const [,m,dd]=iso2jstr(d).split('/');labels+=`<text x="${x+bw/2}" y="${H-8}" text-anchor="middle" fill="${CH.ink2}" font-size="10.5" font-family="inherit">${m}/${dd}</text>`;}
  });
  const grid=[0.5,1].map(f=>`<line x1="0" x2="${W}" y1="${H-pb-f*(H-pb-pt)}" y2="${H-pb-f*(H-pb-pt)}" stroke="${CH.grid}" stroke-width="1"/>`).join('');
  return `<div style="display:flex;gap:14px;font-size:12px;color:var(--tx2);margin-bottom:6px">
    <span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${CH.aqua};margin-inline-end:5px"></i>۷۰٪ به بالا</span>
    <span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${CH.blue};margin-inline-end:5px"></i>زیر ۷۰٪</span></div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" dir="ltr">${grid}<line x1="0" x2="${W}" y1="${H-pb}" y2="${H-pb}" stroke="#383a35" stroke-width="1.5"/>${bars}${labels}</svg>`;
}

function dashHTML(){
  const prjs=byE('project'),tasks=byE('task'),obs=byE('objective');
  const overdue=tasks.filter(t=>t.d.status!=='Done'&&ds(t.d.due)&&ds(t.d.due)<today());
  const noObj=prjs.filter(p=>!relIds(p,'objective').length);
  const noOwner=tasks.filter(t=>t.d.status!=='Done'&&(!relIds(t,'owner').length||!ds(t.d.due)));
  const crmDue=byE('crm').filter(c=>ds(c.d.next)&&ds(c.d.next)<=today());
  const ideasDue=byE('idea').filter(i=>['💭 خام','🔍 در حال ارزیابی'].includes(i.d.status)&&ds(i.d.due)&&ds(i.d.due)<=today());
  const lettersOpen=byE('letter').filter(l=>l.d.astatus!=='Done'&&l.d.kind==='وارده 📥');
  const delayed=prjs.filter(p=>p.d.sched==='تاخیر دارد');
  let h=`<div class="cards">
    ${card('🏢 شرکت‌ها',byE('company').length,null,"go('list','company')")}
    ${card('🧢 کسب‌وکارها',byE('business').length,null,"go('list','business')")}
    ${card('🏗️ پروژه فعال',prjs.filter(p=>p.d.status==='در حال اجرا').length,null,"go('list','project',null,'activePrj')")}
    ${card('📘 تسک باز',tasks.filter(t=>t.d.status!=='Done').length,null,"go('list','task',null,'openTask')")}
    ${card('⏰ تسک عقب‌افتاده',overdue.length,overdue.length?'var(--bad)':null,"go('list','task',null,'overdueTask')")}
    ${card('🎯 اهداف فعال',obs.filter(o=>o.d.status!=='Done').length,null,"go('list','objective',null,'activeObj')")}
  </div>`;
  // آبشار
  h+=`<div class="sec"><h3>📐 زنجیره آبشاری: استراتژی ← اهداف ← پروژه‌ها ← تسک‌ها</h3>`;
  const strats=byE('strategy').filter(s=>!(s.d.parent&&s.d.parent[0]));
  if(!strats.length)h+=`<div class="empty">اولین استراتژی را در بخش «🔗 استراتژی» ثبت کنید</div>`;
  strats.forEach(s=>{h+=stratNode(s);});
  h+=`</div>`;
  // هشدارها
  h+=`<div class="sec"><h3>📜 هشدارهای آیین‌نامه</h3>`;
  const alerts=[];
  noObj.forEach(p=>alerts.push(['🏗️ پروژه بدون هدف استراتژیک: '+p.d.title,'project',p.id]));
  noOwner.forEach(t=>alerts.push(['📘 تسک بدون مسئول یا ددلاین: '+t.d.title,'task',t.id]));
  overdue.forEach(t=>alerts.push(['⏰ ددلاین گذشته: '+t.d.title+' ('+fmtD(t.d.due)+')','task',t.id]));
  delayed.forEach(p=>alerts.push(['🐢 پروژه دارای تاخیر: '+p.d.title,'project',p.id]));
  crmDue.forEach(c=>alerts.push(['📞 پیگیری CRM سررسید شده: '+c.d.title,'crm',c.id]));
  ideasDue.forEach(i=>alerts.push(['💡 مهلت تصمیم‌گیری ایده: '+i.d.title,'idea',i.id]));
  lettersOpen.forEach(l=>alerts.push(['✉️ نامه وارده بدون اقدام: '+l.d.title,'letter',l.id]));
  if(!alerts.length)h+=`<div class="empty">✅ همه‌چیز طبق آیین‌نامه است — هیچ کاری زمین نمانده</div>`;
  alerts.slice(0,30).forEach(a=>h+=`<div class="alert" onclick="go('rec','${a[1]}','${a[2]}')">${esc(a[0])}</div>`);
  h+=`</div>`;
  return h;
}
function card(l,v,col,click){return `<div class="card" ${click?`style="cursor:pointer" onclick="${click}"`:''}><div class="l">${l}</div><div class="v" style="${col?'color:'+col:''}">${typeof v==='number'?v.toLocaleString('fa-IR'):v}</div></div>`;}
function stratNode(s){
  let h=`<div class="tnode"><div class="tline" onclick="go('rec','strategy','${s.id}')">🔗 <span class="nm">${esc(s.d.title)}</span> ${pbarHTML(strategyProg(s))}</div>`;
  byE('objective').filter(o=>relIds(o,'strategy').includes(s.id)).forEach(o=>{
    h+=`<div class="tnode"><div class="tline" onclick="go('rec','objective','${o.id}')">🎯 <span class="nm">${esc(o.d.title)}</span> ${pbarHTML(objectiveProg(o))}</div>`;
    byE('project').filter(p=>relIds(p,'objective').includes(o.id)).forEach(p=>{
      const tcount=byE('task').filter(t=>relIds(t,'project').includes(p.id)).length;
      h+=`<div class="tnode"><div class="tline" onclick="go('rec','project','${p.id}')">🏗️ ${esc(p.d.title)} ${pbarHTML(projectProg(p))} <span class="pnum">${tcount.toLocaleString('fa-IR')} تسک</span></div></div>`;
    });
    h+=`</div>`;
  });
  return h+`</div>`;
}

let cur=null;

function drawModal(){

    else if(f.t===LNG)h+=`<textarea data-k="${f.k}" rows="2">${esc(v||'')}</textarea>`;
    else if(f.t===NUM)h+=`<input data-k="${f.k}" type="number" dir="ltr" value="${v??''}">`;
    else if(f.t===DAT)h+=dateInputHTML(f);
    else if(f.t===CHK)h+=`<label style="display:flex;align-items:center;gap:8px;margin:0;padding:8px 10px;background:var(--bg);border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--tx)"><input type="checkbox" data-k="${f.k}" ${v?'checked':''} style="width:auto;accent-color:var(--ac)"> انجام شد</label>`;
    else if(f.t===URLF)h+=`<input data-k="${f.k}" dir="ltr" placeholder="https://…" value="${esc(v||'')}">`;
    else if(f.t===FIL){
      const fs=Array.isArray(v)?v:[];
      h+=`<div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px">

          ${f.img?`<img src="${esc(x.url)}" style="height:34px;border-radius:5px">`:'📎'}
          <a href="${esc(x.url)}" target="_blank" rel="noopener" style="color:var(--ac);flex:1;overflow:hidden;text-overflow:ellipsis">${esc(x.name||'فایل')}</a>
          <span style="color:var(--bad);cursor:pointer" onclick="rmFile('${f.k}',${i})">✕</span></div>`).join('')}
        <input type="file" ${f.img?'accept="image/*"':''} onchange="upFile('${f.k}',this)" style="border:none;padding:2px;font-size:12px">
        <div id="fu_${f.k}" style="font-size:11px;color:var(--tx2)"></div></div>`;
    }
    else if(f.t===SEL||f.t===STA){const oo=optsFor(e,f);h+=`<select data-k="${f.k}"><option value="">—</option>${oo.concat(v&&!oo.includes(v)?[v]:[]).map(o=>`<option ${v===o?'selected':''} value="${esc(o)}">${esc(STATFA[o]||o)}</option>`).join('')}</select>`;}
    else if(f.t===MUL){const oo=optsFor(e,f);h+=`<select data-k="${f.k}" multiple size="3">${oo.map(o=>`<option ${(v||[]).includes(o)?'selected':''} value="${esc(o)}">${esc(o)}</option>`).join('')}</select>`;}

  if(id){

    }));
    if(back.length){h+=`<div style="margin-top:14px"><label>ارجاعات معکوس</label>`;
      back.forEach(b=>{h+=`<div style="margin:4px 0;font-size:12px;color:var(--tx2)">${b[0]}: ${b[2].map(r=>`<span class="tag" style="cursor:pointer" onclick="closeModal();go('rec','${b[1]}','${r.id}')">${esc(r.d.title||'—')}</span>`).join('')}</div>`;});

      <span style="flex:1"></span><button class="btn gh" onclick="closeModal()">بستن</button></div>`;

function relPicker(f){
  const sel=relIds(cur,f.k);
  const opts=byE(f.r).sort((a,b)=>(a.d.title||'').localeCompare(b.d.title||'','fa'));
  const canNew=can('c',f.r);
  return `<div class="relbox" onclick="toggleRelList(event,'${f.k}')">${sel.map(id=>`<span class="tag b">${esc(nameOf(id))}</span>`).join('')||'<span style="color:var(--tx2);font-size:12px">انتخاب کنید…</span>'}</div>
  <div class="rellist" id="rl_${f.k}" style="display:none">
    <div style="display:flex;gap:5px;padding:6px;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line)">
      <input id="rq_${f.k}" placeholder="جستجو${canNew?' یا نام مورد جدید':''}…" oninput="filtRel('${f.k}')" onclick="event.stopPropagation()" style="padding:5px 8px;font-size:12px">
      ${canNew?`<button class="btn sm" style="white-space:nowrap" onclick="event.stopPropagation();newRel('${f.k}')">＋ ساخت جدید</button>`:''}
    </div>
    <div id="ro_${f.k}">${opts.map(o=>`<div class="${sel.includes(o.id)?'sel':''}" data-t="${esc((o.d.title||'').toLowerCase())}" onclick="toggleRel('${f.k}','${o.id}',${f.s?1:0})">${esc(o.d.title||'—')}</div>`).join('')||'<div style="color:var(--tx2);padding:7px 10px;font-size:12px">موردی وجود ندارد — نام را بنویسید و «＋ ساخت جدید» بزنید</div>'}</div>
  </div>`;
}
function toggleRelList(ev,k){const el=document.getElementById('rl_'+k);el.style.display=el.style.display==='none'?'block':'none';}
function filtRel(k){
  const q=(document.getElementById('rq_'+k).value||'').toLowerCase().trim();
  document.querySelectorAll('#ro_'+CSS.escape(k)+' [data-t]').forEach(el=>{
    el.style.display=!q||el.dataset.t.includes(q)?'block':'none';
  });
}
function newRel(k){
  const f=E[cur.e].f.find(f=>f.k===k);
  const inp=document.getElementById('rq_'+k);
  const name=(inp&&inp.value||'').trim()||prompt('نام مورد جدید در «'+E[f.r].n+'»:');
  if(!name)return;
  if(!can('c',f.r)){alert('اجازه ایجاد در «'+E[f.r].n+'» را ندارید');return;}
  // اگر رکوردی با همین نام هست، همان را انتخاب کن
  const ex=byE(f.r).find(r=>(r.d.title||'').trim()===name);
  const id=ex?ex.id:uid();
  if(!ex)put({id,e:f.r,d:{title:name,_by:myEmail()},u:Date.now()});
  if(!(Array.isArray(cur.d[k])&&cur.d[k].includes(id)))toggleRel(k,id,f.s?1:0);
}
function toggleRel(k,id,single){
  let v=Array.isArray(cur.d[k])?cur.d[k].slice():[];
  if(v.includes(id))v=v.filter(x=>x!==id);
  else{if(single)v=[id];else v.push(id);}
  cur.d[k]=v;
  // re-render just this picker
  const f=E[cur.e].f.find(f=>f.k===k);
  const list=document.getElementById('rl_'+k);
  const box=list.previousElementSibling;
  const wrap=document.createElement('div');wrap.innerHTML=relPicker(f);
  box.replaceWith(wrap.children[0]);list.replaceWith(wrap.children[0]);
  document.getElementById('rl_'+k).style.display='block';
}
/* --- آپلود فایل (Supabase Storage یا محلی) --- */
async function upFile(k,inp){
  const file=inp.files&&inp.files[0]; if(!file)return;
  const st=document.getElementById('fu_'+k); if(st)st.textContent='در حال آپلود…';
  harvest();
  let url=null;
  if(sb&&session){
    const path=cur.id+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-آ-ی]/g,'_');
    const {error}=await sb.storage.from('files').upload(path,file,{upsert:true});
    if(error){if(st)st.textContent='خطا در آپلود: '+error.message+' (فایل SQL جدید را در Supabase اجرا کرده‌اید؟)';return;}
    url=sb.storage.from('files').getPublicUrl(path).data.publicUrl;
  } else {
    if(file.size>1500000){if(st)st.textContent='در حالت بدون سینک حداکثر ۱.۵ مگابایت';return;}
    url=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  }
  const arr=Array.isArray(cur.d[k])?cur.d[k].slice():[];
  arr.push({name:file.name,url});cur.d[k]=arr;
  drawModal();
}
function rmFile(k,i){harvest();const arr=(cur.d[k]||[]).slice();arr.splice(i,1);cur.d[k]=arr;drawModal();}
function harvest(){
  document.querySelectorAll('#modal [data-k]').forEach(el=>{
    if(el.disabled)return;
    const k=el.dataset.k, f=E[cur.e].f.find(f=>f.k===k);
    if(f.t===NUM)cur.d[k]=el.value===''?null:Number(el.value);
    else if(f.t===MUL)cur.d[k]=[...el.selectedOptions].map(o=>o.value);
    else if(f.t===CHK)cur.d[k]=el.checked?true:null;
    else cur.d[k]=el.value||null;
  });
  // تاریخ‌ها
  const dk={};
  document.querySelectorAll('#modal [data-dk]').forEach(el=>{
    const k=el.dataset.dk;(dk[k]=dk[k]||{})[el.dataset.p]=el.value;
  });
  let err=null;
  Object.entries(dk).forEach(([k,p])=>{
    const s=parseJDate(p.sd,p.st), e=parseJDate(p.ed,p.et);
    if(s===undefined||e===undefined){err='فرمت تاریخ «'+E[cur.e].f.find(f=>f.k===k).n+'» درست نیست (مثال: ۱۴۰۵/۰۳/۱۱)';return;}
    cur.d[k]=(s||e)?{s:s||e,e:s&&e?e:null}:null;
  });
  return err;
}
function saveRec(){
  const err=harvest();
  if(err){alert(err);return;}
  if(!cur.d.title){alert('عنوان الزامی است');return;}
  if(cur._new)cur.d._by=myEmail();
  cur.u=Date.now();delete cur._new;
  put(cur);closeModal();
}
function delRec(){
  if(!can('d',cur.e,recs[cur.id])){alert('اجازه حذف ندارید');return;}
  if(!confirm('حذف شود؟'))return;
  cur.del=true;cur.u=Date.now();const e=cur.e,id=cur.id;put(cur);closeModal();
  if(view.type==='rec'&&view.id===id)go('list',e);
}
function closeModal(){document.getElementById('ovl').classList.remove('show');cur=null;}
document.getElementById('ovl').addEventListener('click',e=>{if(e.target.id==='ovl')closeModal();});

/* ================= LOGIN / SETTINGS ================= */
let authMode='in';
function setAuthMode(m){
  authMode=m;
  document.getElementById('at_in').classList.toggle('on',m==='in');
  document.getElementById('at_up').classList.toggle('on',m==='up');
  document.getElementById('l_go').textContent=m==='in'?'ورود':'ایجاد حساب';
  document.getElementById('l_err').textContent='';
}
function fillLoginForm(){
  if(cfg.url)document.getElementById('l_url').value=cfg.url;
  if(cfg.key)document.getElementById('l_key').value=cfg.key;
  if(!cfg.url||!cfg.key)document.getElementById('l_conn').open=true;
}
async function doLogin(){
  const url=document.getElementById('l_url').value.trim(),key=document.getElementById('l_key').value.trim(),
        em=document.getElementById('l_email').value.trim(),pw=document.getElementById('l_pass').value;
  const errEl=document.getElementById('l_err');errEl.textContent='';
  if(!url||!key){errEl.textContent='در «تنظیمات اتصال»، URL و Anon Key را وارد کنید';document.getElementById('l_conn').open=true;return;}
  if(!em||!pw){errEl.textContent='ایمیل و رمز عبور را وارد کنید';return;}
  cfg.url=url;cfg.key=key;localStorage.setItem('xr_cfg',JSON.stringify(cfg));
  session=null;await initSupabase().catch(()=>false);
  if(!sb){errEl.textContent='اتصال به Supabase برقرار نشد (اینترنت/URL را چک کنید)';return;}
  if(!session){
    if(authMode==='up'){
      if(pw.length<6){errEl.textContent='رمز عبور حداقل ۶ کاراکتر باشد';return;}
      const su=await sb.auth.signUp({email:em,password:pw});
      if(su.error){errEl.textContent='ثبت‌نام ناموفق: '+su.error.message;return;}
      session=su.data.session;
      if(!session){errEl.textContent='حساب ساخته شد ✅ اگر تایید ایمیل فعال است، ایمیل‌تان را تایید و سپس وارد شوید.';setAuthMode('in');return;}
    }else{
      const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
      if(error){errEl.textContent='ورود ناموفق: '+(error.message.includes('Invalid')?'ایمیل یا رمز اشتباه است':error.message);return;}
      session=data.session;
    }
  }
  document.getElementById('login').classList.remove('show');
  await pullAll();bootstrapAdmin();subscribeRT();flush();whoami();render();
}
function localOnly(){cfg.local=1;localStorage.setItem('xr_cfg',JSON.stringify(cfg));
  document.getElementById('login').classList.remove('show');setSync('off','بدون سینک (محلی)');render();}
function openSettings(){
  delete cfg.local;localStorage.setItem('xr_cfg',JSON.stringify(cfg));
  fillLoginForm();
  document.getElementById('login').classList.add('show');
}

  document.getElementById('pomo_stats').innerHTML=
    'امروز: <b style="color:var(--tx)">'+n.toLocaleString('fa-IR')+'</b> پومودورو &nbsp; '+
    [0,1,2,3].map(i=>`<span class="dot ${ (n%4)>i?'':'off'}"></span>`).join('');
  const b=document.getElementById('pomobtn');
  b.textContent=pomo.run?'🍅 '+fmtT(pomo.left):'🍅 پومودورو';
  b.style.background=pomo.run?(pomo.mode==='focus'?'rgba(212,175,55,.18)':'rgba(63,174,124,.18)'):'';
}
function beep(){try{const c=new (window.AudioContext||window.webkitAudioContext)();
  [0,.25,.5].forEach(dt=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.frequency.value=880;g.gain.setValueAtTime(.001,c.currentTime+dt);g.gain.exponentialRampToValueAtTime(.3,c.currentTime+dt+.02);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dt+.2);o.start(c.currentTime+dt);o.stop(c.currentTime+dt+.22);});}catch(e){}}
function pomoTick(){
  pomo.left--;
  if(pomo.left<=0){
    beep();
    if(pomo.mode==='focus'){
      localStorage.setItem(pomoKey(),pomoCount()+1);
      pomo.mode=(pomoCount()%4===0)?'long':'break';
    } else pomo.mode='focus';
    pomo.left=PDUR[pomo.mode];
    document.getElementById('pomo').classList.add('show');
  }
  drawPomo();
}
function pomoStart(){
  if(pomo.run){clearInterval(pomo.iv);pomo.run=false;}
  else{pomo.run=true;pomo.iv=setInterval(pomoTick,1000);}
  drawPomo();
}
function pomoSkip(){pomo.left=1;if(!pomo.run)pomoTick();drawPomo();}
function pomoReset(){clearInterval(pomo.iv);pomo.run=false;pomo.mode='focus';pomo.left=PDUR.focus;drawPomo();}

/* ================= BOOT ================= */
loadLocal();render();fillLoginForm();
(async()=>{
  if(cfg.url&&cfg.key){
    const ok=await initSupabase().catch(()=>false);
    if(ok){await pullAll();bootstrapAdmin();subscribeRT();flush();whoami();render();}
    else if(cfg.local!==1)document.getElementById('login').classList.add('show');
    else setSync('off','بدون سینک (محلی)');
  } else if(cfg.local===1){setSync('off','بدون سینک (محلی)');}
  else document.getElementById('login').classList.add('show');
})();
window.addEventListener('online',()=>{flush();});

let lastPull=0;
window.addEventListener('focus',()=>{if(sb&&session&&Date.now()-lastPull>15000){lastPull=Date.now();pullAll().then(()=>flush());}});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&sb&&session&&Date.now()-lastPull>15000){lastPull=Date.now();pullAll().then(()=>flush());}});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
